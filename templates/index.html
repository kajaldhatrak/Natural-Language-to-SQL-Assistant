<!DOCTYPE html>
<html>
<head>

<title>AI SQL Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4 text-center">Natural Language SQL Assistant</h2>

<form method="post" action="/ask">

<div class="input-group">

<input 
type="text"
class="form-control"
name="question"
placeholder="Ask a question about the database..."
required
>

<button class="btn btn-primary">
Ask
</button>

</div>

</form>

{% if result %}

<div class="card mt-4">

<div class="card-header">
Question
</div>

<div class="card-body">
{{question}}
</div>

</div>

<div class="card mt-3">

<div class="card-header">
AI Response
</div>

<div class="card-body">
{{result}}
</div>

</div>

{% endif %}

</div>

</body>
</html>
